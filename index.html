<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>To My Problem ❤️</title>

<style>

body{
margin:0;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
font-family:cursive;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
color:white;
}

#countdown{
font-size:120px;
text-shadow:0 0 30px pink;
}

#message{
font-size:32px;
white-space:pre-line;
display:none;
opacity:1;
text-shadow:0 0 15px #ff4da6;
}

.closeScene{
display:none;
font-size:40px;
text-shadow:0 0 25px pink;
}

.heart{
position:absolute;
pointer-events:none;
animation:float 6s linear forwards;
}

@keyframes float{
0%{transform:translateY(100vh) scale(0.5);opacity:1;}
100%{transform:translateY(-10vh) scale(1.5);opacity:0;}
}

</style>
</head>

<body>

<div id="countdown"></div>

<div id="message"></div>

<div class="closeScene" id="closeScene">
❤️ Always love you ❤️
</div>

<audio id="bgm" loop>
<source src="https://www.youtube.com/embed/GxldQ9eX2wo">
</audio>

<script>

const textContent = `Title = To My Problem ❤️

ဟေ့ မင်္ဂလာညနေခင်းပါ ကိုယ့်ရဲ့ မရှိမဖြစ်လေးရယ်.......

ခုတလော အဆင်မပြေမူတွေ ကြောင့် တောင်းပန်ပါတယ်နော....

ကိုယ့်မှာမင်းပဲ ရှိတာမို့ တစ်ခါတလေ အစိုးရိမ်လွန် အတွေးလွန်ပြီး
ပြောမှားဆိုမှားတာတွေရှိရင် နားလည်ပေးပါ ❤️`;

window.onload=startCountdown;

function startCountdown(){

let count=3;
let cd=document.getElementById("countdown");
let msg=document.getElementById("message");

let timer=setInterval(()=>{

cd.innerHTML=count;

if(count===0){

clearInterval(timer);
cd.style.display="none";

typeWriter();

setInterval(createHeart,120);

setTimeout(()=>{
document.getElementById("bgm").play().catch(()=>{});
},500);

}else{
count--;
}

},1000);

}

function typeWriter(){

let msg=document.getElementById("message");
msg.style.display="block";

let i=0;
msg.innerHTML="";

function typing(){
if(i < textContent.length){
msg.innerHTML+=textContent.charAt(i);
i++;
setTimeout(typing,40);
}else{

setTimeout(()=>{
msg.style.opacity="0";
},2000);

setTimeout(()=>{
msg.style.display="none";
document.getElementById("closeScene").style.display="block";
},4000);

}
}

typing();
}

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}
<style>

.heart{
position:absolute;
pointer-events:none;
animation:float 6s linear forwards;
}

@keyframes float{
0%{
transform:translateY(100vh) scale(0.5);
opacity:1;
}
100%{
transform:translateY(-10vh) scale(1.5);
opacity:0;
}
}

</style>

<body>

<audio id="bgm" loop>
<source src="https://www.youtube.com/embed/CvFH_6DNRCY" type="audio/mp3">
</audio>

<script>

setInterval(createHeart,120);

function createHeart(){

let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="💖";

heart.style.left=Math.random()*100+"vw";
heart.style.top="100vh";
heart.style.fontSize=(15+Math.random()*30)+"px";

document.body.appendChild(heart);

setTimeout(()=>heart.remove(),6000);
}

window.onload=()=>{
startCountdown();

setTimeout(()=>{
document.getElementById("bgm").play().catch(()=>{});
},800);
};

</script>
</script>

</body>
</html>
